<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辩论钟 - 贸大第七届赛制</title>
    <style>
        :root {
            --bg-main: #F0F7FF; 
            --accent-blue: #007AFF; 
            --text-main: #007AFF;
            --text-secondary: #8E9AAF;
            --white: #FFFFFF;
            --warning-red: #FF6B6B; 
            --bright-red: #FF0000; 
            --bg-btn: #F0F7FF;
            --bg-btn-hover: #E0EFFF;
            --border-radius: 8px; 
            --shadow-apple: 0 2px 8px rgba(0, 0, 0, 0.08); 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; padding: 0;
            font-family: "SF Pro Text", "PingFang SC", sans-serif;
            background-color: var(--bg-main);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; color: var(--text-main);
        }

        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }

        header { 
            padding: 15px 0; text-align: center; position: relative;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .header-title { font-size: 22px; font-weight: bold; letter-spacing: 1px; }

        .ruleset-container {
            position: absolute; right: 30px; top: 50%; transform: translateY(-50%);
        }

        main {
            flex: 1; display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 0 5%; transition: all 0.3s ease;
            position: relative;
        }

        .timer-unit {
            width: 340px; text-align: center; padding: 40px 30px;
            background: var(--white); border-radius: 12px;
            box-shadow: var(--shadow-apple); border: 2px solid transparent;
            transition: all 0.3s ease; cursor: pointer;
            position: relative; z-index: 1;
        }
        .timer-unit.focused { border-color: var(--accent-blue); background: #fcfdfe; transform: scale(1.02); }
        .timer-unit.single-mode { width: 550px; }

        .extra-tools {
            position: fixed; bottom: 120px; right: 20px;
            display: flex; flex-direction: column; gap: 6px;
            padding: 8px; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); border-radius: 12px;
            box-shadow: var(--shadow-apple); border: 1px solid rgba(0, 122, 255, 0.1);
            z-index: 2000;
        }
        .btn-tool {
            width: 38px; height: 38px; border-radius: 8px;
            border: none; background: var(--accent-blue); color: white;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .pos-info { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: var(--text-main); }
        .phase-name-display { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
        
        .time-display {
            font-size: 80px; font-weight: bold; font-variant-numeric: tabular-nums;
            font-family: "SF Mono", monospace;
        }

        .time-low { color: var(--warning-red); }
        .flash-red { animation: flash-red-anim 0.5s infinite; }
        @keyframes flash-red-anim {
            0%, 100% { color: var(--text-main); }
            50% { color: var(--bright-red); }
        }

        .controls-wrapper {
            padding-bottom: 30px; display: flex; flex-direction: column;
            align-items: center; gap: 12px; z-index: 100;
        }

        .phase-indicator { font-weight: bold; font-size: 13px; color: var(--text-secondary); margin-bottom: 2px; }

        .primary-nav-group { 
            display: flex; align-items: center; gap: 8px; 
        }

        /* 菜单容器样式 */
        .menu-container { position: relative; }

        /* 透明桥接层逻辑：用于防止鼠标移动到子菜单时丢失焦点 */
        .menu-container::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            background: transparent;
            z-index: 4999;
            display: none;
        }

        /* 当赛制选择（向下展开）时的桥接层 */
        .ruleset-container .menu-container::after {
            height: 12px;
            top: 100%;
        }

        /* 当奇袭（向上展开）时的桥接层 */
        .special-menu-container .menu-container::after {
            height: 12px;
            bottom: 100%;
        }

        .menu-container:hover::after { display: block; }

        .pop-menu {
            display: none; position: absolute;
            background: var(--white); min-width: 140px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12); border-radius: var(--border-radius);
            z-index: 5000; border: 1px solid #E0EFFF;
            padding: 6px;
        }
        .menu-container:hover .pop-menu { display: block; }
        
        .ruleset-container .pop-menu { top: 100%; right: 0; margin-top: 8px; }
        .special-menu-container .pop-menu { bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 8px; }

        .pop-menu button {
            width: 100%; padding: 10px; border: none; background: none; 
            color: var(--text-main); text-align: left; cursor: pointer; font-size: 13px;
            border-radius: 4px; transition: 0.2s; white-space: nowrap;
        }
        .pop-menu button:hover { background: var(--bg-btn-hover); }

        .btn-phase {
            padding: 0 16px; height: 38px;
            background: var(--bg-btn); color: var(--accent-blue);
            border: 1px solid rgba(0, 122, 255, 0.1); border-radius: var(--border-radius);
            font-size: 14px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            white-space: nowrap;
        }
        .btn-phase:hover { background: var(--bg-btn-hover); border-color: var(--accent-blue); }
        .btn-phase:active { transform: scale(0.97); }

        .action-buttons { display: flex; gap: 12px; margin-top: 5px; }
        .btn-action {
            height: 46px; padding: 0 30px;
            border-radius: var(--border-radius); font-size: 16px; font-weight: bold;
            cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-main { background: var(--accent-blue); color: white; }
        .btn-main:hover { background: #0066D6; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        .btn-sub { background: #F5F7FA; color: var(--accent-blue); border: 1px solid transparent; }
        .btn-sub:hover { border-color: var(--accent-blue); background: #FFFFFF; }

        /* 管理后台 UI */
        .config-container { display: flex; gap: 20px; padding: 20px 40px; flex: 1; overflow: hidden; }
        .panel { background: white; border-radius: 12px; box-shadow: var(--shadow-apple); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 12px 20px; border-bottom: 1px solid #F0F7FF; display: flex; justify-content: space-between; align-items: center; font-weight: bold; background: #fafcff; font-size: 15px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .card { border: 1px solid #F0F7FF; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; font-size: 14px; }
        .card:hover { border-color: var(--accent-blue); background: #fcfdfe; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #E0EFFF; border-radius: 6px; font-size: 14px; }
        .btn-circle { width: 24px; height: 24px; border-radius: 50%; border: none; background: var(--accent-blue); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .btn-circle.del { background: #FF6B6B; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #f0f7ff; width: 850px; height: 75vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        
        .shortcut-hint { font-size: 11px; color: var(--text-secondary); margin-top: 2px; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="page-main" class="page active">
        <header>
            <div class="header-title">辩论钟</div>
            <div class="ruleset-container">
                <div class="menu-container">
                    <button class="btn-phase">赛制选择 ▾</button>
                    <div class="pop-menu" id="ruleset-pop">
                        <div id="ruleset-items"></div>
                        <div style="height:1px; background:#F5F7FA; margin:6px 0;"></div>
                        <button onclick="gotoConfig()">进入管理后台</button>
                    </div>
                </div>
            </div>
        </header>

        <main id="timer-container">
            <div id="unit-pro" class="timer-unit focused" onclick="setFocus('pro')">
                <div class="pos-info" id="pos-pro">加载中...</div>
                <div class="phase-name-display" id="name-pro">环节</div>
                <div id="time-pro" class="time-display">00:00</div>
            </div>
            <div id="unit-opp" class="timer-unit" onclick="setFocus('opp')">
                <div class="pos-info" id="pos-opp">加载中...</div>
                <div class="phase-name-display" id="name-opp">环节</div>
                <div id="time-opp" class="time-display">00:00</div>
            </div>
        </main>

        <div class="extra-tools">
            <button class="btn-tool" onclick="addTime(5)">+5s</button>
            <button class="btn-tool" style="background:#F5F7FA; color:#8E9AAF; height:30px" onclick="addTime(-5)">-5s</button>
        </div>

        <div class="controls-wrapper">
            <div class="phase-indicator" id="phase-step-label">加载环节数据...</div>
            
            <div class="primary-nav-group">
                <button class="btn-phase" id="btn-prev" onclick="changeStep(-1)">← 上一环节</button>
                <button class="btn-phase" id="btn-next" onclick="changeStep(1)">下一环节 →</button>
                
                <div class="special-menu-container">
                    <div class="menu-container">
                        <button class="btn-phase">奇袭 ▾</button>
                        <div class="pop-menu">
                            <button onclick="applySpecialPhase('奇袭申论', 120)">申论 (2:00)</button>
                            <button onclick="applySpecialPhase('奇袭质询', 150)">质询 (2:30)</button>
                            <button onclick="applyPhase()">取消奇袭 (恢复当前)</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-action btn-main" id="btn-toggle" onclick="toggleTimer()">开始计时 (Space)</button>
                <button class="btn-action btn-sub" onclick="resetCurrent()">重置环节</button>
                <!-- 修改：后台设置按钮改为时间设置 -->
                <button class="btn-action btn-sub" onclick="openQuickTimeEditor()">时间设置</button>
            </div>
            <div class="shortcut-hint" id="shortcut-display"></div>
        </div>
    </div>

    <!-- 管理后台页面 -->
    <div id="page-config" class="page">
        <header style="justify-content: space-between; padding: 0 30px;">
            <button class="btn-phase" onclick="gotoMain()">← 返回计时</button>
            <div class="header-title">系统管理后台</div>
            <div style="width: 100px;"></div>
        </header>
        <div class="config-container">
            <div class="panel" style="flex: 1;">
                <div class="panel-header">
                    <span>环节库</span>
                    <button class="btn-phase" style="height:30px" onclick="showPhaseModal()">+ 新环节</button>
                </div>
                <div class="scroll-area" id="phase-list-admin"></div>
            </div>
            <div class="panel" style="flex: 1.5;">
                <div class="panel-header">
                    <span>赛制流程模板</span>
                    <button class="btn-phase" style="height:30px" onclick="openRulesetEditor()">+ 新增赛制</button>
                </div>
                <div class="scroll-area" id="ruleset-list-admin"></div>
            </div>
        </div>
    </div>

    <!-- 弹窗：环节库编辑 -->
    <div id="modal-phase" class="modal">
        <div class="modal-content" style="width: 350px; height: auto; padding: 25px;">
            <h3 style="margin-top:0">环节编辑</h3>
            <div class="input-group"><label>环节名称</label><input type="text" id="edit-phase-name"></div>
            <div class="input-group"><label>发言辩位</label><input type="text" id="edit-phase-pos"></div>
            <div class="input-group"><label>时间 (秒)</label><input type="number" id="edit-phase-time"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-action btn-sub" style="flex:1; height:38px" onclick="closeModal('modal-phase')">取消</button>
                <button class="btn-action btn-main" style="flex:1; height:38px" onclick="savePhase()">保存</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：赛制流程编辑 -->
    <div id="modal-ruleset" class="modal">
        <div class="modal-content">
            <div style="padding: 15px 30px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <input type="text" id="rs-edit-name" placeholder="输入赛制名称..." style="font-size: 18px; font-weight: bold; border: none; outline: none; width: 250px;">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-action btn-sub" style="height:38px; padding:0 20px" onclick="closeModal('modal-ruleset')">取消</button>
                    <button class="btn-action btn-main" style="height:38px; padding:0 20px" onclick="saveNewRuleset()">保存赛制</button>
                </div>
            </div>
            <div style="display: flex; flex: 1; overflow: hidden;">
                <div style="width: 300px; background: #fafcff; border-right: 1px solid #eee; display: flex; flex-direction: column;">
                    <div style="padding: 12px; font-weight: bold; color: #8e9aaf; font-size:13px">点击左侧 [+] 加入赛制</div>
                    <div class="scroll-area" id="phase-picker-list"></div>
                </div>
                <div style="flex: 1; padding: 15px; display: flex; flex-direction: column;">
                    <div style="margin-bottom: 10px; font-weight: bold; font-size:14px">当前流程</div>
                    <div class="scroll-area" id="rs-selected-list" style="background: white; border-radius: 8px; border: 2px dashed #E0EFFF;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增：弹窗：快速时间设置 -->
    <div id="modal-time-editor" class="modal">
        <div class="modal-content" style="width: 350px; height: auto; padding: 25px;">
            <h3 style="margin-top:0">快速调整时间</h3>
            <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 15px;">直接修改当前各方的剩余秒数</p>
            
            <div id="quick-edit-normal">
                <div class="input-group">
                    <label>正方剩余秒数</label>
                    <input type="number" id="quick-time-pro">
                </div>
                <div class="input-group">
                    <label>反方剩余秒数</label>
                    <input type="number" id="quick-time-opp">
                </div>
            </div>

            <div id="quick-edit-single" style="display: none;">
                <div class="input-group">
                    <label>当前计时剩余秒数</label>
                    <input type="number" id="quick-time-single">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-action btn-sub" style="flex:1; height:38px" onclick="closeModal('modal-time-editor')">取消</button>
                <button class="btn-action btn-main" style="flex:1; height:38px" onclick="applyQuickTime()">确定修改</button>
            </div>
        </div>
    </div>

    <script>
        let allPhases = JSON.parse(localStorage.getItem('db_phases')) || [
            { id: 'p1', name: '立论', time: 210, pos: '一辩' },
            { id: 'p2', name: '质询', time: 90, pos: '四辩' },
            { id: 'p3', name: '驳论', time: 120, pos: '二辩' },
            { id: 'p4', name: '对辩', time: 120, pos: '二辩' },
            { id: 'p5', name: '盘问', time: 90, pos: '三辩' },
            { id: 'p6', name: '小结', time: 120, pos: '三辩' },
            { id: 'p7', name: '自由辩论', time: 240, pos: '全体' },
            { id: 'p8', name: '总结陈词', time: 210, pos: '四辩' }
        ];

        let rulesets = JSON.parse(localStorage.getItem('db_rulesets')) || [
            { id: 'r1', name: '贸大标准赛', order: ['p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'p7', 'p8'] }
        ];

        let currentRulesetId = rulesets[0].id;
        let currentStep = 0;
        let activeSide = 'pro';
        let isSingleMode = false;
        let timerInterval = null;
        let state = { pro: { time: 0, running: false }, opp: { time: 0, running: false }, single: { time: 0, running: false } };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function init() {
            renderRulesetMenu();
            applyRuleset(currentRulesetId);
            setupGlobalEvents();
        }

        function setupGlobalEvents() {
            document.addEventListener('keydown', (e) => {
                if (document.activeElement.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
                else if (e.key === ',' || e.key === '，') { if(!isSingleMode) triggerSide('pro'); }
                else if (e.key === '.' || e.key === '。') { if(!isSingleMode) triggerSide('opp'); }
            });
        }

        function triggerSide(side) { stopAll(); activeSide = side; toggleTimer(); }

        function toggleTimer() {
            const cur = isSingleMode ? state.single : state[activeSide];
            if (cur.running) stopAll();
            else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                cur.running = true;
                document.getElementById('btn-toggle').innerText = '暂停计时 (Space)';
                timerInterval = setInterval(tick, 1000);
            }
            updateUI();
        }

        function stopAll() {
            clearInterval(timerInterval);
            state.pro.running = false; state.opp.running = false; state.single.running = false;
            document.getElementById('btn-toggle').innerText = '开始计时 (Space)';
        }

        function tick() {
            const cur = isSingleMode ? state.single : state[activeSide];
            if (cur.time > 0) {
                cur.time--;
                if (cur.time === 30) playBeep(440, 0.4);
                if (cur.time <= 5 && cur.time > 0) playBeep(880, 0.1);
                if (cur.time === 0) { playBeep(660, 1.2); stopAll(); }
                updateUI();
            }
        }

        function updateUI() {
            const sides = isSingleMode ? ['pro'] : ['pro', 'opp'];
            sides.forEach(id => {
                const s = isSingleMode ? state.single : state[id];
                const display = document.getElementById(`time-${id}`);
                const unit = document.getElementById(`unit-${id}`);
                const m = Math.floor(s.time / 60).toString().padStart(2, '0');
                const sec = (s.time % 60).toString().padStart(2, '0');
                if(display) {
                    display.innerText = `${m}:${sec}`;
                    display.classList.toggle('time-low', s.time < 30);
                    display.classList.toggle('flash-red', s.time <= 5 && s.time > 0);
                }
                if(unit) unit.classList.toggle('focused', activeSide === id || (isSingleMode && id === 'pro'));
            });
            updateShortcutHint();
        }

        function updateShortcutHint() {
            const hintArea = document.getElementById('shortcut-display');
            const phaseName = document.getElementById('name-pro').innerText;
            if (phaseName.includes('对辩') || phaseName.includes('自由辩论')) {
                hintArea.innerText = '快捷键：逗号(,) - 正方开始 | 句号(.) - 反方开始';
            } else {
                hintArea.innerText = '';
            }
        }

        function applyRuleset(rid) {
            currentRulesetId = rid;
            const rs = rulesets.find(r => r.id === rid);
            if(!rs) return;
            const mainRsBtn = document.querySelector('header .btn-phase');
            if(mainRsBtn) mainRsBtn.innerText = `赛制：${rs.name} ▾`;
            currentStep = 0;
            applyPhase();
        }

        function applyPhase() {
            stopAll();
            isSingleMode = false;
            const rs = rulesets.find(r => r.id === currentRulesetId);
            const pid = rs.order[currentStep];
            const p = allPhases.find(x => x.id === pid) || allPhases[0];

            state.pro.time = p.time;
            state.opp.time = p.time;
            document.getElementById('pos-pro').innerText = `正方${p.pos}`;
            document.getElementById('pos-opp').innerText = `反方${p.pos}`;
            document.getElementById('name-pro').innerText = p.name;
            document.getElementById('name-opp').innerText = p.name;
            document.getElementById('unit-opp').style.display = 'block';
            document.getElementById('unit-pro').classList.remove('single-mode');
            activeSide = 'pro';
            updateUI();
            updateStepButtons();
        }

        function applySpecialPhase(name, time) {
            stopAll();
            isSingleMode = true;
            state.single.time = time;
            document.getElementById('pos-pro').innerText = "奇袭计时";
            document.getElementById('name-pro').innerText = name;
            document.getElementById('unit-opp').style.display = 'none';
            document.getElementById('unit-pro').classList.add('single-mode');
            activeSide = 'single';
            updateUI();
        }

        function changeStep(dir) {
            const rs = rulesets.find(r => r.id === currentRulesetId);
            const newStep = currentStep + dir;
            if (newStep >= 0 && newStep < rs.order.length) {
                currentStep = newStep;
                applyPhase();
            }
        }

        function updateStepButtons() {
            const rs = rulesets.find(r => r.id === currentRulesetId);
            document.getElementById('btn-prev').disabled = (currentStep === 0);
            document.getElementById('btn-next').disabled = (currentStep === rs.order.length - 1);
            document.getElementById('phase-step-label').innerText = `进程 ${currentStep + 1} / ${rs.order.length}`;
        }

        function setFocus(side) {
            if (isSingleMode) return;
            if (state[activeSide].running) triggerSide(side);
            else { activeSide = side; updateUI(); }
        }

        // 快速时间设置功能
        function openQuickTimeEditor() {
            stopAll();
            const normalGrp = document.getElementById('quick-edit-normal');
            const singleGrp = document.getElementById('quick-edit-single');
            
            if (isSingleMode) {
                normalGrp.style.display = 'none';
                singleGrp.style.display = 'block';
                document.getElementById('quick-time-single').value = state.single.time;
            } else {
                normalGrp.style.display = 'block';
                singleGrp.style.display = 'none';
                document.getElementById('quick-time-pro').value = state.pro.time;
                document.getElementById('quick-time-opp').value = state.opp.time;
            }
            document.getElementById('modal-time-editor').style.display = 'flex';
        }

        function applyQuickTime() {
            if (isSingleMode) {
                state.single.time = parseInt(document.getElementById('quick-time-single').value) || 0;
            } else {
                state.pro.time = parseInt(document.getElementById('quick-time-pro').value) || 0;
                state.opp.time = parseInt(document.getElementById('quick-time-opp').value) || 0;
            }
            updateUI();
            closeModal('modal-time-editor');
        }

        function gotoConfig() { 
            stopAll();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-config').classList.add('active');
            renderAdminLists();
        }

        function gotoMain() { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-main').classList.add('active');
            renderRulesetMenu();
            applyRuleset(currentRulesetId);
        }

        function renderAdminLists() {
            const pList = document.getElementById('phase-list-admin');
            pList.innerHTML = '';
            allPhases.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div><div style="font-weight:bold">${p.name}</div><div style="font-size:11px;color:#888">${p.pos} | ${p.time}s</div></div><div style="display:flex; gap:4px;"><button class="btn-phase" style="height:26px; padding:0 8px; font-size:12px" onclick="showPhaseModal('${p.id}')">编辑</button><button class="btn-phase" style="height:26px; padding:0 8px; font-size:12px; color:#FF6B6B" onclick="deletePhase('${p.id}')">删除</button></div>`;
                pList.appendChild(div);
            });
            const rList = document.getElementById('ruleset-list-admin');
            rList.innerHTML = '';
            rulesets.forEach(r => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div style="font-weight:bold">${r.name} (${r.order.length}步)</div><div style="display:flex; gap:4px;"><button class="btn-phase" style="height:26px; padding:0 8px; font-size:12px" onclick="openRulesetEditor('${r.id}')">流程</button><button class="btn-phase" style="height:26px; padding:0 8px; font-size:12px; color:#FF6B6B" onclick="deleteRuleset('${r.id}')">删除</button></div>`;
                rList.appendChild(div);
            });
        }

        function showPhaseModal(id = null) {
            editingPhaseId = id;
            if(id) {
                const p = allPhases.find(x => x.id === id);
                document.getElementById('edit-phase-name').value = p.name;
                document.getElementById('edit-phase-pos').value = p.pos;
                document.getElementById('edit-phase-time').value = p.time;
            } else {
                document.getElementById('edit-phase-name').value = '';
                document.getElementById('edit-phase-pos').value = '';
                document.getElementById('edit-phase-time').value = 120;
            }
            document.getElementById('modal-phase').style.display = 'flex';
        }

        function savePhase() {
            const name = document.getElementById('edit-phase-name').value;
            const pos = document.getElementById('edit-phase-pos').value;
            const time = parseInt(document.getElementById('edit-phase-time').value);
            if(!name || !pos) return;
            if(editingPhaseId) {
                const p = allPhases.find(x => x.id === editingPhaseId);
                Object.assign(p, { name, pos, time });
            } else {
                allPhases.push({ id: 'p' + Date.now(), name, pos, time });
            }
            saveToStorage(); closeModal('modal-phase'); renderAdminLists();
        }

        function deletePhase(id) { if(allPhases.length > 1) { allPhases = allPhases.filter(p => p.id !== id); saveToStorage(); renderAdminLists(); } }

        let editingRulesetId = null;
        let tempRulesetOrder = [];
        function openRulesetEditor(id = null) {
            editingRulesetId = id;
            if(id) {
                const rs = rulesets.find(x => x.id === id);
                document.getElementById('rs-edit-name').value = rs.name;
                tempRulesetOrder = [...rs.order];
            } else {
                document.getElementById('rs-edit-name').value = '';
                tempRulesetOrder = [];
            }
            renderRulesetBuilder();
            document.getElementById('modal-ruleset').style.display = 'flex';
        }

        function renderRulesetBuilder() {
            const picker = document.getElementById('phase-picker-list');
            picker.innerHTML = '';
            allPhases.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<span>${p.name}</span> <button class="btn-circle" onclick="addToRS('${p.id}')">+</button>`;
                picker.appendChild(div);
            });
            const selected = document.getElementById('rs-selected-list');
            selected.innerHTML = tempRulesetOrder.length === 0 ? '<div style="text-align:center; color:#ccc; padding:30px;">未选择流程</div>' : '';
            tempRulesetOrder.forEach((pid, index) => {
                const p = allPhases.find(x => x.id === pid) || { name: '未知' };
                const div = document.createElement('div');
                div.className = 'card';
                div.style.margin = "6px";
                div.innerHTML = `<span>${index+1}. ${p.name}</span> <button class="btn-circle del" onclick="removeFromRS(${index})">-</button>`;
                selected.appendChild(div);
            });
        }

        function addToRS(pid) { tempRulesetOrder.push(pid); renderRulesetBuilder(); }
        function removeFromRS(index) { tempRulesetOrder.splice(index, 1); renderRulesetBuilder(); }

        function saveNewRuleset() {
            const name = document.getElementById('rs-edit-name').value || "未命名";
            if(tempRulesetOrder.length === 0) return;
            if(editingRulesetId) {
                const rs = rulesets.find(x => x.id === editingRulesetId);
                rs.name = name; rs.order = [...tempRulesetOrder];
            } else {
                rulesets.push({ id: 'r' + Date.now(), name, order: [...tempRulesetOrder] });
            }
            saveToStorage(); closeModal('modal-ruleset'); renderAdminLists();
        }

        function deleteRuleset(id) { if(rulesets.length > 1) { rulesets = rulesets.filter(r => r.id !== id); saveToStorage(); renderAdminLists(); } }

        function renderRulesetMenu() {
            const menu = document.getElementById('ruleset-items');
            menu.innerHTML = '';
            rulesets.forEach(r => {
                const btn = document.createElement('button');
                btn.innerText = r.name;
                btn.onclick = () => applyRuleset(r.id);
                menu.appendChild(btn);
            });
        }

        function saveToStorage() {
            localStorage.setItem('db_phases', JSON.stringify(allPhases));
            localStorage.setItem('db_rulesets', JSON.stringify(rulesets));
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function addTime(s) { const cur = isSingleMode ? state.single : state[activeSide]; cur.time = Math.max(0, cur.time+s); updateUI(); }
        function resetCurrent() { if(isSingleMode) applySpecialPhase(document.getElementById('name-pro').innerText, state.single.time); else applyPhase(); }
        function playBeep(f, d) { try { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + d); } catch(e) {} }

        window.onload = init;
    </script>
</body>
</html>
